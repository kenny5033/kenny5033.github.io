<p>List disk partitions: <code>lsblk</code>, <code>fdisk -l</code></p>
<p>Get UUID of disk partition: <code>blkid</code></p>
<p>See kernel symbol table: <code>less /proc/ksyms</code></p>
<p>See currently loaded kernel modules: <code>less /proc/modules</code></p>
<p>List device files: <code>ls -l /dev</code></p>
